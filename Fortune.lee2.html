<!DOCTYPE html>
<html lang="en">

  <body>
  <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laurence 老師的算命教室</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d0814;
            --panel-bg: #1a1226;
            --border-color: #3d2b56;
            --text-color: #ffffff;
            --accent-gold: #dfb76c;
            --accent-purple: #8a4fff;
            --btn-hover: #fae0a4;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', 'Noto Serif TC', serif;
            font-weight: 700; 
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: var(--panel-bg);
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(138, 79, 255, 0.2), inset 0 0 15px rgba(223, 183, 108, 0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 850px;
            padding: 30px;
            position: relative;
        }
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        h1 {
            color: var(--accent-gold);
            font-size: 2rem;
            font-family: 'Noto Serif TC', serif;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(223, 183, 108, 0.5);
        }
        .clear-btn {
            background: transparent;
            border: 2px solid #ff4e4e;
            color: #ff4e4e;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 900;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            background: #ff4e4e;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 78, 78, 0.4);
        }
        
        /* 金鑰專用美化區 */
        .key-box {
            background: rgba(138, 79, 255, 0.1);
            border: 1px solid var(--accent-purple);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 1rem;
            margin-bottom: 6px;
            color: var(--accent-gold);
            font-weight: 900;
        }
        .input-group input, .input-group select {
            background: rgba(13, 8, 20, 0.8);
            border: 2px solid var(--border-color);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 700;
            outline: none;
            transition: border 0.3s;
        }
        .submit-btn {
            background: linear-gradient(135deg, var(--accent-gold), #b89047);
            color: #0d0814;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        .submit-btn:hover {
            background: linear-gradient(135deg, var(--btn-hover), var(--accent-gold));
            box-shadow: 0 0 15px rgba(223, 183, 108, 0.4);
        }
        .info-panel {
            background: rgba(61, 43, 86, 0.3);
            border: 2px dashed var(--accent-gold);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .info-panel.show { opacity: 1; }
        .info-item span { color: var(--accent-gold); font-weight: 900; }
        .tabs {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #251a36;
            border: 2px solid var(--border-color);
            color: #ffffff;
            padding: 12px 2px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            transition: all 0.3s;
            text-align: center;
        }
        .tab-btn:hover { border-color: var(--accent-purple); background: #312347; }
        .tab-btn.active {
            background: var(--accent-purple);
            color: #fff;
            border-color: var(--accent-purple);
            box-shadow: 0 0 10px rgba(138, 79, 255, 0.4);
        }
        .content-display {
            background: rgba(13, 8, 20, 0.85);
            border: 2px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            padding: 25px;
            min-height: 250px;
            line-height: 1.9;
            font-size: 1.1rem;
            color: #ffffff;
            white-space: pre-wrap; 
        }
        .placeholder-text {
            color: #a183ca;
            text-align: center;
            font-style: italic;
            margin-top: 80px;
            font-weight: 700;
        }
        .loading {
            text-align: center;
            color: var(--accent-gold);
            font-size: 1.25rem;
            font-weight: 900;
            margin-top: 70px;
        }
        .loading i { margin-right: 10px; animation: spin 1s infinite linear; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h1><i class="fa-solid fa-wand-magic-sparkles"></i> Laurence 老師的算命教室</h1>
            <button class="clear-btn" id="clearBtn"><i class="fa-solid fa-trash-can"></i> 清除資料</button>
        </div>

        <div class="key-box">
            <div class="input-group">
                <label><i class="fa-solid fa-key"></i> 請輸入您的 Gemini API Key（此金鑰僅存於您的瀏覽器中）</label>
                <input type="password" id="geminiApiKey" placeholder="AIzaSy...">
            </div>
        </div>

        <div class="input-grid">
            <div class="input-group">
                <label>姓名</label>
                <input type="text" id="userName" placeholder="請輸入姓名">
            </div>
            <div class="input-group">
                <label>性別</label>
                <select id="userGender">
                    <option value="乾造 (男)">男</option>
                    <option value="坤造 (女)">女</option>
                </select>
            </div>
            <div class="input-grid" style="grid-column: span 2; margin:0; padding:0;">
                <div class="input-group">
                    <label>出生日期</label>
                    <input type="date" id="userBirthDate">
                </div>
                <div class="input-group">
                    <label>生辰時暮</label>
                    <select id="userBirthTime">
                        <option value="子時 (23:00-01:00)">子時 (23-01)</option>
                        <option value="丑時 (01:00-03:00)">丑時 (01-03)</option>
                        <option value="寅時 (03:00-05:00)">寅時 (03-05)</option>
                        <option value="卯時 (05:00-07:00)">卯時 (05-07)</option>
                        <option value="辰時 (07:00-09:00)">辰時 (07-09)</option>
                        <option value="巳時 (09:00-11:00)">巳時 (09-11)</option>
                        <option value="午時 (11:00-13:00)">午時 (11-13)</option>
                        <option value="未時 (13:00-15:00)">未時 (13-15)</option>
                        <option value="申時 (15:00-17:00)">申時 (15-17)</option>
                        <option value="酉時 (17:00-19:00)">酉時 (17-19)</option>
                        <option value="戌時 (19:00-21:00)">戌時 (19-21)</option>
                        <option value="亥時 (21:00-23:00)">亥時 (21-23)</option>
                    </select>
                </div>
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>出生地點</label>
                <input type="text" id="userLocation" placeholder="例如：台灣台北市">
            </div>
        </div>

        <button class="submit-btn" id="submitBtn">完成天機開示</button>

        <div class="info-panel" id="infoPanel">
            <div class="info-item">目前實歲：<span id="displayAge">-</span> 歲</div>
            <div class="info-item">本命星座：<span id="displaySign">-</span></div>
        </div>

        <div class="tabs">
            <button class="tab-btn" data-type="name">姓名筆畫</button>
            <button class="tab-btn" data-type="akashic">阿卡西紀錄</button>
            <button class="tab-btn" data-type="horoscope">星座運勢</button>
            <button class="tab-btn" data-type="wuxing">五行學說</button>
            <button class="tab-btn" data-type="future">接下來運勢</button>
        </div>

        <div class="content-display" id="contentDisplay">
            <div class="placeholder-text">🔮 請先輸入上方資料並按下「完成天機開示」按鈕，再點選分類檢視算命結果。</div>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <script type="module">
        import { GoogleGenAI } from '@google/generative-ai';

        let userData = null;
        let activeTab = null;
        const cacheResults = { name: '', akashic: '', horoscope: '', wuxing: '', future: '' };

        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');
        const infoPanel = document.getElementById('infoPanel');
        const displayAge = document.getElementById('displayAge');
        const displaySign = document.getElementById('displaySign');
        const contentDisplay = document.getElementById('contentDisplay');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const apiKeyInput = document.getElementById('geminiApiKey');

        // 自動從本地瀏覽器快取讀取舊的 API Key，不用每次重複打
        if(localStorage.getItem('laurence_gemini_key')) {
            apiKeyInput.value = localStorage.getItem('laurence_gemini_key');
        }

        submitBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            const name = document.getElementById('userName').value.trim();
            const gender = document.getElementById('userGender').value;
            const birthDate = document.getElementById('userBirthDate').value;
            const birthTime = document.getElementById('userBirthTime').value;
            const location = document.getElementById('userLocation').value.trim();

            if (!key) {
                alert('請輸入您的 Gemini API Key 才能開啟天機連線！');
                return;
            }
            if (!name || !birthDate || !location) {
                alert('請完整填寫姓名、出生日期與出生地點，方能窺探天機！');
                return;
            }

            // 儲存金鑰到瀏覽器記憶體
            localStorage.setItem('laurence_gemini_key', key);

            const age = calculateAge(birthDate);
            const sign = getZodiacSign(birthDate);

            userData = { name, gender, birthDate, birthTime, location, age, sign };

            displayAge.textContent = age;
            displaySign.textContent = sign;
            infoPanel.classList.add('show');

            for (let key in cacheResults) cacheResults[key] = '';
            switchTab('name');
        });

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (!userData) {
                    alert('請先輸入基本資料並按下「完成天機開示」！');
                    return;
                }
                const type = button.getAttribute('data-type');
                switchTab(type);
            });
        });

        async function switchTab(type) {
            activeTab = type;
            
            tabButtons.forEach(btn => {
                if (btn.getAttribute('data-type') === type) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            if (cacheResults[type]) {
                contentDisplay.innerHTML = cacheResults[type];
                return;
            }

            contentDisplay.innerHTML = `<div class="loading"><i class="fa-solid fa-spinner"></i> Laurence 老師正在為您閉眼掐指算命，請稍候...</div>`;

            try {
                const currentKey = apiKeyInput.value.trim();
                const ai = new GoogleGenAI({ apiKey: currentKey });
                const model = ai.getGenerativeModel({ model: 'gemini-2.5-flash' });
                
                const prompt = generatePrompt(type, userData);
                const result = await model.generateContent({ contents: prompt });
                const responseText = result.response.text();

                cacheResults[type] = responseText;
                contentDisplay.innerHTML = responseText;

            } catch (error) {
                console.error(error);
                contentDisplay.innerHTML = `<span style="color:#ff4e4e;">天機連線失敗。請確認您輸入的 API Key 是否正確且未過期，或者網路是否順暢。</span>`;
            }
        }

        function generatePrompt(type, data) {
            let basePrompt = `你是一位精通東西方命理、占星與流年神算的大師「Laurence 老師」。現在有一位緣主前來問卜，其資料如下：
- 姓名：${data.name}
- 性別：${data.gender}
- 出生日期：${data.birthDate} 
- 出生時辰：${data.birthTime}
- 出生居住地：${data.location}
- 星座：${data.sign}
- 實歲年齡：${data.age} 歲\n\n`;

            if (type === 'name') {
                return basePrompt + `請針對他的「姓名筆畫解析」進行大師級的詳細算命。請分析其姓名結構、人格、地格、總格之吉凶暗示，並給予未來一年的運勢建議。語氣要專業、充滿神秘感且溫暖。`;
            } else if (type === 'akashic') {
                return basePrompt + `請針對他的「阿卡西紀錄 (Akashic Records)」進行宇宙靈魂解讀。請說明他靈魂的轉世特質、前世帶來此生的業力課題、天天赋使命，以及宇宙此時此刻給他的神聖指引。`;
            } else if (type === 'horoscope') {
                return basePrompt + `請針對他的本命星座「${data.sign}」做近期的「星座運勢」詳細解析。請涵蓋：整體運勢、財運投資、愛情桃花、工作事業，並給予專屬的幸運色與幸運數字。`;
            } else if (type === 'wuxing') {
                return basePrompt + `請針對他的生辰八字與五行（金、木、水、火、土）進行「五行學說」的格局論述。請推算其五行旺衰、喜用神是什麼，並針對其身體健康、居家風水布局給予調和與補足五行的具體建議。`;
            } else if (type === 'future') {
                return basePrompt + `請針對他「接下來的流年運勢」進行深度預測。請幫他剖析未來這一年內（春、夏、秋、冬四季）的運勢高低起伏，指出何時是轉機起飛點、何時應保守低調，並在防小人、健康或重大決策上給予極具權威性的 Laurence 老師獨家指引。`;
            }
            return basePrompt;
        }

        clearBtn.addEventListener('click', () => {
            document.getElementById('userName').value = '';
            document.getElementById('userGender').value = '乾造 (男)';
            document.getElementById('userBirthDate').value = '';
            document.getElementById('userBirthTime').value = '子時 (23:00-01:00)';
            document.getElementById('userLocation').value = '';
            infoPanel.classList.remove('show');
            contentDisplay.innerHTML = `<div class="placeholder-text">🔮 請先輸入上方資料並按下「完成天機開示」按鈕，再點選分類檢視算命結果。</div>`;
            tabButtons.forEach(btn => btn.classList.remove('active'));
            userData = null;
        });

        function calculateAge(birthDateString) {
            const today = new Date();
            const birthDate = new Date(birthDateString);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
            return age;
        }

        function getZodiacSign(dateString) {
            const date = new Date(dateString);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "白羊座";
            if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "金牛座";
            if ((month == 5 && day >= 21) || (month == 6 && day <= 21)) return "雙子座";
            if ((month == 6 && day >= 22) || (month == 7 && day <= 22)) return "巨蟹座";
            if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "獅子座";
            if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "處女座";
            if ((month == 9 && day >= 23) || (month == 10 && day <= 23)) return "天秤座";
            if ((month == 10 && day >= 24) || (month == 11 && day <= 22)) return "天蠍座";
            if ((month == 11 && day >= 23) || (month == 12 && day <= 21)) return "射手座";
            if ((month == 12 && day >= 22) || (month == 1 && day <= 19)) return "摩羯座";
            if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "水瓶座";
            if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "雙魚座";
            return "神祕星座";
        }
    </script>
</body>
</html>
